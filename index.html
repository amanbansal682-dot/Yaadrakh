<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>YaadRakh App</title>

  <style>

    body{
      margin:0;
      padding:0;
      font-family:Arial, sans-serif;
      background:#f2f2f2;

      display:flex;
      justify-content:center;
      align-items:center;

      min-height:100vh;
    }

    .container{
      background:white;
      padding:40px;
      border-radius:20px;
      text-align:center;

      width:350px;

      box-shadow:0 0 20px rgba(0,0,0,0.2);
    }

    h1{
      color:#333;
      margin-bottom:10px;
    }

    p{
      color:#666;
    }

    button{
      width:100%;
      margin-top:15px;
      padding:12px;

      border:none;
      border-radius:10px;

      background:blue;
      color:white;

      font-size:18px;
      cursor:pointer;
    }

    button:hover{
      background:darkblue;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>YaadRakh App</h1>

    <p>All Features Working</p>

    <button onclick="openGoogle()">
      Open Google
    </button>

    <button onclick="openCalculator()">
      Calculator
    </button>

    <button onclick="openNotes()">
      Notes
    </button>

    <button onclick="openReminder()">
      Reminder
    </button>

    <button onclick="openLogin()">
      Login Page
    </button>

    <button onclick="darkMode()">
      Dark Mode
    </button>

  </div>

  <script>

    function openGoogle(){

      window.open("https://google.com");

    }

    function openCalculator(){

      alert("Calculator Opened");

    }

    function openNotes(){

      alert("Notes Opened");

    }

    function openReminder(){

      alert("Reminder Opened");

    }

    function openLogin(){

      let name = prompt("Enter Username");

      if(name){

        alert("Welcome " + name);

      }

    }

    function darkMode(){

      document.body.style.background = "black";

      document.body.style.color = "white";

    }

  </script>

</body>

</html>
