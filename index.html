<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>YaadRakh App</title>

  <style>

    body{
      margin:0;
      padding:0;
      font-family:Arial, sans-serif;
      background:#f2f2f2;

      display:flex;
      justify-content:center;
      align-items:center;

      height:100vh;
    }

    .container{
      background:white;
      padding:40px;
      border-radius:20px;
      text-align:center;

      box-shadow:0 0 20px rgba(0,0,0,0.2);
    }

    h1{
      color:#333;
      margin-bottom:20px;
    }

    p{
      color:#666;
      font-size:18px;
    }

    button{
      margin-top:20px;
      padding:12px 25px;

      border:none;
      border-radius:10px;

      background:blue;
      color:white;

      font-size:18px;
      cursor:pointer;
    }

    button:hover{
      background:darkblue;
    }

    #message{
      margin-top:20px;
      color:green;
      font-size:20px;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>Welcome To YaadRakh App</h1>

    <p>This is my first HTML website.</p>

    <button onclick="showMessage()">
      Click Me
    </button>

    <h2 id="message"></h2>

  </div>

  <script>

    function showMessage(){

      document.getElementById("message").innerHTML =
      "App Working Successfully!";

    }

  </script>

</body>

</html>
