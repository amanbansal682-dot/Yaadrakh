<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>YaadRakh App</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#0f172a;
      color:white;
    }

    .navbar{
      width:100%;
      padding:20px;
      background:#1e293b;
      text-align:center;
      font-size:28px;
      font-weight:bold;
    }

    .container{
      padding:30px;
    }

    .card{
      background:#1e293b;
      padding:25px;
      border-radius:20px;
      margin-bottom:20px;
    }

    h2{
      margin-bottom:15px;
    }

    button{
      padding:12px 20px;
      border:none;
      border-radius:10px;
      background:#2563eb;
      color:white;
      font-size:16px;
      cursor:pointer;
      margin-top:10px;
    }

    button:hover{
      background:#1d4ed8;
    }

    input{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      margin-top:10px;
      font-size:16px;
    }

    .notes-area{
      width:100%;
      height:120px;
      border:none;
      border-radius:10px;
      padding:10px;
      margin-top:10px;
      font-size:16px;
    }

    #result{
      margin-top:15px;
      font-size:22px;
      color:#22c55e;
    }

  </style>
</head>

<body>

  <div class="navbar">
    YaadRakh App
  </div>

  <div class="container">

    <!-- LOGIN -->

    <div class="card">

      <h2>Login</h2>

      <input type="text" id="username"
      placeholder="Enter Username">

      <button onclick="login()">
        Login
      </button>

    </div>


    <!-- REMINDER -->

    <div class="card">

      <h2>Reminder</h2>

      <input type="text" id="reminder"
      placeholder="Write Reminder">

      <button onclick="saveReminder()">
        Save Reminder
      </button>

      <p id="reminderText"></p>

    </div>


    <!-- NOTES -->

    <div class="card">

      <h2>Notes</h2>

      <textarea class="notes-area"
      placeholder="Write Notes Here"></textarea>

    </div>


    <!-- CALCULATOR -->

    <div class="card">

      <h2>Calculator</h2>

      <input type="number" id="num1"
      placeholder="First Number">

      <input type="number" id="num2"
      placeholder="Second Number">

      <button onclick="calculate()">
        Add Numbers
      </button>

      <div id="result"></div>

    </div>


    <!-- GOOGLE -->

    <div class="card">

      <h2>Google Search</h2>

      <button onclick="openGoogle()">
        Open Google
      </button>

    </div>

  </div>


  <script>

    function login(){

      let name =
      document.getElementById("username").value;

      alert("Welcome " + name);

    }


    function saveReminder(){

      let text =
      document.getElementById("reminder").value;

      document.getElementById("reminderText")
      .innerHTML = "Saved Reminder: " + text;

    }


    function calculate(){

      let a =
      Number(document.getElementById("num1").value);

      let b =
      Number(document.getElementById("num2").value);

      let sum = a + b;

      document.getElementById("result")
      .innerHTML = "Result = " + sum;

    }


    function openGoogle(){

      window.open("https://google.com");

    }

  </script>

</body>

</html>
